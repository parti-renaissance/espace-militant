name: Deploy on firebase preview channel
description: Deploy on firebase hosting preview channel

inputs:
  firebaseServiceAccount:
    description: Firebase service account JSON
    required: true
  projectId:
    description: Firebase project ID
    required: true
  channelId:
    description: Preview channel ID (branch name by default)
    required: true
  expire:
    description: Time of expiry (default to 7 days)
    required: false
    default: '7d'

outputs:
  url:
    description: Deployment URL
    value: ${{ steps.deploy.outputs.details_url }}

runs:
  using: composite
  steps:
    - uses: FirebaseExtended/action-hosting-deploy@v0
      id: deploy
      with:
        firebaseServiceAccount: ${{ inputs.firebaseServiceAccount }}
        projectId: ${{ inputs.projectId }}
        channelId: ${{ inputs.channelId }}
        expires: ${{ inputs.expire }}
        firebaseToolsVersion: '13.35.1'
